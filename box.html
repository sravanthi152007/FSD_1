<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model Example</title>
    <style>
        .box {
            width: 300px;              /* Content width */
            background-color: red;

            padding: 100px;             /* Space inside border */
            border: 555px black;    /* Border around content */
            margin: 70px;             /* Space outside border */

            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>CSS Box Model Demonstration</h2>

    <div class="box">
        This is the content area of the box model.
        Padding creates space inside the box.
        Border surrounds the padding and content.
        Margin creates space outside the box.
    </div>

</body>
</html>
