<!DOCTYPE html>
<html>
<head>
    <title>Weekday Display</title>
</head>
<body>

    <h2>Display Weekday Using Switch Case</h2>

    <label>Enter a number (0-6): </label>
    <input type="number" id="dayInput" min="1" max="7">
    <button onclick="showDay()">Show Day</button>

    <h3 id="result"></h3>

    <script>
        function showDay() {
            let day = parseInt(document.getElementById("dayInput").value);
            let result;

            switch(day) {
                case 0:
                    result = "Monday";
                    break;
                case 1:
                    result = "Tuesday";
                    break;
                case 2:
                    result = "Wednesday";
                    break;
                case 3:
                    result = "Thursday";
                    break;
                case 4:
                    result = "Friday";
                    break;
                case 5:
                    result = "Saturday";
                    break;
                case 6:
                    result = "Sunday";
                    break;
                default:
                    result = "Invalid input! Please enter a number between 1 and 7.";
            }

            document.getElementById("result").innerHTML = result;
        }
    </script>

</body>
</html>
