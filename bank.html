<!DOCTYPE html>
<html>
<head>
    <title>Denomination Calculator</title>
</head>
<body>

    <h2>Bank Denomination Calculator</h2>

    <label>Enter Amount: </label>
    <input type="number" id="amount">
    <button onclick="calculateDenomination()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function calculateDenomination() {
            let amount = parseInt(document.getElementById("amount").value);
            let result = "";

            let notes = [100, 50, 20, 10, 5, 2, 1];

            for (let i = 0; i < notes.length; i++) {
                let count = Math.floor(amount / notes[i]);

                if (count > 0) {
                    result += count + " - " + notes[i] + "'s<br>";
                    amount = amount % notes[i];
                }
            }

            document.getElementById("result").innerHTML = result;
        }
    </script>

</body>
</html>
