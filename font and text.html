<!DOCTYPE html>
<html>
<head>
    <title>CSS Font and Text Properties</title>
    <style>
        h1 {
            font-size: 36px;              /* font-size */
            font-weight: bold;            /* font-weight */
            text-align: center;           /* text-alignment */
            text-decoration: underline;   /* text-decoration */
        }

        p {
            font-size: 18px;
            font-style: italic;          
            text-transform: uppercase;   
            text-align: left;
        }

        .normalText {
            font-weight: normal;
            text-decoration: none;
            text-transform: lowercase;
            text-align: middle;
        }
    </style>
</head>
<body>

    <h1>CSS FONT AND TEXT EXAMPLE</h1>

    <p>
        This paragraph shows italic style, uppercase text transformation,
        and left alignment.
    </p>

    <p class="normalText">
        THIS LINE SHOWS LOWERCASE TRANSFORMATION AND RIGHT ALIGNMENT.
    </p>

</body>
</html>
