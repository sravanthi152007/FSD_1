<!DOCTYPE html>
<html>
<head>
    <title>Loops Example</title>
</head>
<body>

    <h2>Print Numbers from 1 to 10</h2>

    <button onclick="printNumbers()">Show Numbers</button>

    <h3>For Loop:</h3>
    <p id="forLoop"></p>

    <h3>While Loop:</h3>
    <p id="whileLoop"></p>

    <h3>Do-While Loop:</h3>
    <p id="doWhileLoop"></p>

    <script>
        function printNumbers() {
            let i;
            let forResult = "";
            let whileResult = "";
            let doWhileResult = "";

            // For Loop
            for(i = 1; i <= 10; i++) {
                forResult += i + " ";
            }

            // While Loop
            i = 1;
            while(i <= 10) {
                whileResult += i + " ";
                i++;
            }

            // Do-While Loop
            i = 1;
            do {
                doWhileResult += i + " ";
                i++;
            } while(i <= 10);

            // Display results
            document.getElementById("forLoop").innerHTML = forResult;
            document.getElementById("whileLoop").innerHTML = whileResult;
            document.getElementById("doWhileLoop").innerHTML = doWhileResult;
        }
    </script>

</body>
</html>
