
<!DOCTYPE html>
<html>
<head>
<title>Math Object Example</title>

<script>
function showMath()
{
    var num = parseInt(document.getElementById("number").value);

    // Math object property
    var piValue = Math.PI;

    // Math object methods
    var squareRoot = Math.sqrt(num);
    var power = Math.pow(num, 2);
    var randomNum = Math.random();

    document.getElementById("result").innerHTML =
    "Value of PI: " + piValue + "<br>" +
    "Square Root of " + num + " = " + squareRoot + "<br>" +
    "Square of " + num + " = " + power + "<br>" +
    "Random Number: " + randomNum;
}
</script>

</head>

<body>

<h2>Math Object Properties and Methods</h2>

Enter a Number:
<input type="text" id="number"><br><br>

<button onclick="showMath()">Calculate</button>

<p id="result"></p>

</body>
</html>
