
<!DOCTYPE html>
<html>
<head>
<title>Number Operations</title>
<script>

// Factorial Function
function factorial() {
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("result").innerHTML = "Factorial of " + n + " = " + fact;
}

// Fibonacci Function
function fibonacci() {
    let n = parseInt(document.getElementById("num").value);
    let a = 0, b = 1, temp;
    let series = "Fibonacci Series: " + a + " " + b + " ";

    for (let i = 2; i < n; i++) {
        temp = a + b;
        series += temp + " ";
        a = b;
        b = temp;
    }

    document.getElementById("result").innerHTML = series;
}

// Prime Numbers Function
function primeNumbers() {
    let n = parseInt(document.getElementById("num").value);
    let primes = "Prime numbers up to " + n + ": ";

    for (let i = 2; i <= n; i++) {
        let isPrime = true;

        for (let j = 2; j <= i/2; j++) {
            if (i % j == 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            primes += i + " ";
        }
    }

    document.getElementById("result").innerHTML = primes;
}

// Palindrome Function
function palindrome() {
    let n = document.getElementById("num").value;
    let rev = n.split("").reverse().join("");

    if (n === rev) {
        document.getElementById("result").innerHTML = n + " is a Palindrome";
    } else {
        document.getElementById("result").innerHTML = n + " is not a Palindrome";
    }
}

</script>
</head>

<body>

<h2>Number Operations</h2>

Enter a Number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="primeNumbers()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<h3 id="result"></h3>

</body>
</html>
